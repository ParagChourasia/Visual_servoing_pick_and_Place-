controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    franka_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    franka_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

franka_arm_controller:
  ros__parameters:
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

franka_gripper_controller:
  ros__parameters:
    joints:
      - fer_finger_joint1
      - fer_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
